name: food_delivery
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_easyloading: ^3.0.5
  flutter_rating_bar: ^4.0.1
  google_maps_flutter: ^2.6.1
  geolocator: ^13.0.1
  url_launcher: ^6.2.5
  web_socket_channel: ^2.4.0
  socket_io_client: ^2.0.3
  image_picker: ^1.0.7
  otp_pin_field: ^1.0.1
  flutter_timezone: ^1.0.8
  # custom_map_markers: ^1.0.0   # <-- removed
  get_it: ^7.6.7
  flutter_stripe: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/font/Metropolis-Regular.otf
        - asset: assets/font/Metropolis-Medium.otf
          weight: 500
        - asset: assets/font/Metropolis-SemiBold.otf
          weight: 600
        - asset: assets/font/Metropolis-Bold.otf
          weight: 700
        - asset: assets/font/Metropolis-ExtraBold.otf
          weight: 800